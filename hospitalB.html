<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amrita Hospital Kochi | Medical Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0f172a;
            --medical-blue: #2563eb;
            --emergency-red: #ef4444;
            --glass: rgba(255, 255, 255, 0.9);
            --overlay: rgba(15, 23, 42, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://www.amritahospitals.org/_next/image?url=https%3A%2F%2Fadmin.amritahospitals.org%2Fsites%2Fdefault%2Ffiles%2F2024-09%2Fkochi-hospital-banner_0.webp&w=3840&q=90');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .home-nav {
            position: absolute;
            top: 20px;
            left: 25px;
            text-decoration: none;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .home-nav:hover {
            color: var(--medical-blue);
        }

        .hospital-header {
            margin-top: 10px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .rating {
            margin-bottom: 20px;
            color: #fbbf24;
            font-size: 14px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: #475569;
            font-size: 14px;
            line-height: 1.4;
        }

        .info-row i {
            color: var(--medical-blue);
            width: 20px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .doctor-btn {
            background-color: var(--medical-blue);
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }

        .doctor-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .ambulance-btn {
            background-color: var(--emergency-red);
            color: white;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
        }

        .ambulance-btn:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
        }

        .official-link {
            display: block;
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
        }

        .official-link:hover {
            color: var(--medical-blue);
        }

    </style>
</head>
<body>

    <div class="container">
        <a href="home.html" class="home-nav">
            <i class="fa-solid fa-house"></i> Home
        </a>

        <div class="hospital-header">
            <i class="fa-solid fa-hospital" style="font-size: 40px; color: var(--medical-blue); margin-bottom: 15px;"></i>
            <h1>Amrita Hospital</h1>
            <p style="color: #64748b; font-weight: 600;">Ponekkara, Kochi</p>
        </div>

        <div class="rating">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <span style="color: #64748b; margin-left: 8px;">(4.8/5 NABH Accredited)</span>
        </div>

        <div class="info-card">
            <div class="info-row">
                <i class="fas fa-map-marker-alt"></i>
                <span><strong>Address:</strong> Ponekkara, AIMS (P.O.), Kochi, Kerala 682041</span>
            </div>
            <div class="info-row">
                <i class="fas fa-compass"></i>
                <span><strong>Coordinates:</strong> 10.0327° N, 76.2921° E</span>
            </div>
            <div class="info-row">
                <i class="fas fa-phone-alt"></i>
                <span><strong>Contact:</strong> +91 484 285 1234</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="doctorB.html" class="btn doctor-btn">
                <i class="fas fa-user-md"></i> Doctors
            </a>
            <a href="ambulance.html" class="btn ambulance-btn">
                <i class="fas fa-ambulance"></i> Ambulance
            </a>
        </div>

        <a href="https://www.amritahospitals.org/" target="_blank" class="official-link">
            Visit Official Web Portal <i class="fas fa-external-link-alt" style="font-size: 10px;"></i>
        </a>
    </div>

</body>
</html>
