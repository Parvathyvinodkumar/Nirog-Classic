            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative; /* Needed for positioning back button */
        }

        /* Home Button Style */
        .home-nav {
            position: absolute;
            top: 20px;
            left: 25px;
            text-decoration: none;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .home-nav:hover {
            color: var(--medical-blue);
        }

        .hospital-header {
            margin-top: 10px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .rating {
            margin-bottom: 20px;
            color: #fbbf24;
            font-size: 14px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: #475569;
            font-size: 14px;
            line-height: 1.4;
        }

        .info-row i {
            color: var(--medical-blue);
            width: 20px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .doctor-btn {
            background-color: var(--medical-blue);
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }

        .doctor-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .ambulance-btn {
            background-color: var(--emergency-red);
            color: white;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3);
        }

        .ambulance-btn:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
        }

        .official-link {
            display: block;
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
        }

        .official-link:hover {
            color: var(--medical-blue);
        }

    </style>
</head>
